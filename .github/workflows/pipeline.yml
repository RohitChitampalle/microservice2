name: PROD CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Debug (check if username is coming)
      - name: Debug Docker Username
        run: echo "USERNAME=${{ secrets.DOCKER_USERNAME }}"

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image with proper tags
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/gallery:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/gallery:${{ github.run_number }} .

      # Push Docker Images
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/gallery:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/gallery:${{ github.run_number }}
